<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:fn="http://xmlns.jcp.org/jsp/jstl/functions"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <h:outputStylesheet library="css" name="styles.css"/>
    <h:outputStylesheet library="css" name="appointment/styles.css"/>
</h:head>
<h:body>
    <ui:composition template="../templates/main.xhtml">
        <ui:define name="content">
            <div>
                <p:dataTable value="#{appointmentBean.appointments}" var="appointment">
                    <p:column>
                        <f:facet name="header">Date</f:facet>
                        <h:outputText value="#{appointment.appointmentDate}">
                            <f:convertDateTime pattern="dd/MM/yyyy HH:mm" type="localDateTime"/>
                        </h:outputText>
                    </p:column>
                    <p:column>
                        <f:facet name="header">Patient</f:facet>
                        #{fn:toUpperCase(appointment.patient.lastName)}, #{appointment.patient.firstName}
                    </p:column>
                    <p:column>
                        <f:facet name="header">Doctor</f:facet>
                        Dr #{fn:toUpperCase(appointment.doctor.lastName)}
                    </p:column>
                </p:dataTable>
                <!--ui:repeat value="#{appointmentBean.appointments}" var="a">
                    <div>#{a.appointmentDate}</div>
                </ui:repeat-->
            </div>
        </ui:define>
    </ui:composition>
</h:body>
</html>
