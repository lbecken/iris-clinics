<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:fn="http://xmlns.jcp.org/jsp/jstl/functions"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <h:outputStylesheet library="css" name="doctor/styles.css"/>
</h:head>
<h:body>
    <ui:composition template="../templates/main.xhtml">
        <ui:define name="content">
            <div>
                <h:form>
                    <p:dataTable id="doctorsTable" value="#{doctorBean.doctors}" var="doctor">
                        <p:column>
                            <f:facet name="header">Name</f:facet>
                            #{fn:toUpperCase(doctor.lastName)}, #{doctor.firstName}
                        </p:column>
                        <p:column>
                            <p:link value="Edit" outcome="doctor-create?id=#{doctor.id}"/>
                            <p:commandButton value="Disable" action="#{doctorBean.setDoctorActive(doctor.id, false)}" disabled="#{!doctor.active}" update="doctorsTable"/>
                            <p:commandButton value="Enable" action="#{doctorBean.setDoctorActive(doctor.id, true)}" disabled="#{doctor.active}" update="doctorsTable"/>
                        </p:column>
                    </p:dataTable>
                    <!--ui:repeat value="${doctorBean.doctors}" var="d">
                        <div>#{d.lastName}, #{d.firstName}</div>
                    </ui:repeat-->
                </h:form>
                <p:link value="New" outcome="doctor-create"/>
            </div>
        </ui:define>
    </ui:composition>
</h:body>
</html>
