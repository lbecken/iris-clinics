<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head/>
<h:body>
    <h:form>
        <p:panelGrid columns="2">
            <p:outputLabel for="firstName" value="First name:" />
            <p:inputText id="firstName" value="#{patientEditBean.patient.firstName}" />

            <p:outputLabel for="lastName" value="Last name:" />
            <p:inputText id="lastName" value="#{patientEditBean.patient.lastName}" />
        </p:panelGrid>

        <p:link value="Back" outcome="patients-list"/>
        <p:commandButton value="Save" action="#{patientEditBean.save}" />
    </h:form>
</h:body>
</html>
